# Build Sparkamp as a Flatpak bundle on every push to main.
#
# The resulting .flatpak file is uploaded as a build artifact so that anyone
# can download and test the latest build without waiting for a release.
#
# Requirements:
#   1. packaging/cargo-sources.json must exist (generated once via
#      flatpak-cargo-generator.py Cargo.lock -o packaging/cargo-sources.json
#      and committed to the repository).
#   2. The dev.sparkamp.Sparkamp.yml manifest must be at the repo root.
#
# The job runs on ubuntu-latest and uses the
# flatpak/flatpak-github-actions action to handle installing Flatpak,
# the freedesktop runtime, and the SDK extension automatically.

name: Build Flatpak

on:
  push:
    branches:
      - main
  # Allow manual triggering from the Actions tab.
  workflow_dispatch:

jobs:
  build-flatpak:
    name: Build and upload Flatpak bundle
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Install Flatpak tooling ───────────────────────────────────────────
      # The flatpak-builder-lint action brings in flatpak, flatpak-builder,
      # and the necessary runtimes via Flathub.
      - name: Install Flatpak and builder
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            flatpak flatpak-builder elfutils

      # ── Add Flathub remote ────────────────────────────────────────────────
      # Use --user so the remote and the runtimes installed below live in
      # the same scope as `flatpak-builder --user` later in the workflow.
      # Mixing system-scope remotes/installs with a --user build causes
      # `error: No remote refs found for 'flathub'` when flatpak-builder
      # tries to resolve --install-deps-from=flathub.
      - name: Add Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak remote-add --user --if-not-exists flathub-beta \
            https://dl.flathub.org/beta-repo/flathub-beta.flatpakrepo

      # ── Install runtime and SDK ───────────────────────────────────────────
      - name: Install Flatpak runtime and SDK
        run: |
          flatpak install --user -y --noninteractive flathub \
            org.gnome.Platform//47 \
            org.gnome.Sdk//47 \
            org.freedesktop.Sdk.Extension.rust-stable//24.08

      # ── Vendor Rust dependencies ──────────────────────────────────────────
      # The repo's .cargo/config.toml redirects crates-io to a local `vendor/`
      # directory, but `vendor/` is gitignored. The local dev workflow keeps
      # vendor/ checked out via `cargo vendor` after a fresh clone; CI must do
      # the same so the `type: dir` source in the manifest copies the vendored
      # crates into the sandbox where it has no network access.
      - name: Vendor Rust dependencies
        run: cargo vendor

      # ── Build the Flatpak ─────────────────────────────────────────────────
      - name: Build Flatpak
        run: |
          flatpak-builder \
            --force-clean \
            --user \
            --install-deps-from=flathub \
            --repo=repo \
            build-dir \
            dev.sparkamp.Sparkamp.yml

      # ── Bundle into a single .flatpak file ────────────────────────────────
      - name: Create .flatpak bundle
        run: |
          flatpak build-bundle repo \
            Sparkamp-${{ github.sha }}.flatpak \
            dev.sparkamp.Sparkamp \
            --runtime-repo=https://dl.flathub.org/repo/flathub.flatpakrepo

      # ── Upload artifact ───────────────────────────────────────────────────
      - name: Upload Flatpak bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sparkamp-flatpak-${{ github.sha }}
          path: Sparkamp-${{ github.sha }}.flatpak
          # Keep build artifacts for 30 days.
          retention-days: 30

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Write job summary
        run: |
          echo "## Sparkamp Flatpak Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The \`.flatpak\` bundle has been uploaded as a build artifact." >> $GITHUB_STEP_SUMMARY
          echo "Download it from the **Artifacts** section of this workflow run," >> $GITHUB_STEP_SUMMARY
          echo "then install with:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "flatpak install --user Sparkamp-${{ github.sha }}.flatpak" >> $GITHUB_STEP_SUMMARY
          echo "flatpak run dev.sparkamp.Sparkamp --ui" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
