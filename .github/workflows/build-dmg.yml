# Build Sparkamp.dmg on macOS for every push to main.
#
# Mirrors the trigger of build.yml (the Flatpak workflow) so a Linux
# Flatpak and a macOS DMG are produced from the same commit. The
# resulting unsigned .dmg is uploaded as a workflow artifact.
#
# Notes
# -----
#  * Runs on macos-latest (Apple Silicon). The bundled .dmg is therefore
#    arm64-only — Intel Macs will need a separate runner job.
#  * The build is ad-hoc signed (no Apple Developer account / cert
#    required). On first launch users must right-click → Open or run
#    `xattr -cr /Applications/SparkampMac.app` to bypass Gatekeeper.
#  * The heavy lifting (Rust static lib, xcodebuild archive, GStreamer
#    bundling, install_name rewrites, DMG packaging) lives in
#    packaging/macos/build-dmg.sh — this workflow only sets up the
#    environment and invokes that script.

name: Build DMG

on:
  push:
    branches:
      - main
    # Tag-triggered runs (vX.Y.Z) also publish the DMG as a Release asset.
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-dmg:
    name: Build and upload macOS DMG
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Rust toolchain ────────────────────────────────────────────────────
      # macos-latest already ships rustup; this just ensures a stable
      # toolchain is selected and on PATH for the Cargo Build phase.
      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # ── Cache cargo registry + target dir ────────────────────────────────
      # Reuses crate downloads + the macos workspace member's build outputs
      # across runs. Keyed on Cargo.lock so a dep change invalidates the
      # cache cleanly.
      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── Homebrew GStreamer ───────────────────────────────────────────────
      # build-dmg.sh expects the GStreamer dylibs and plug-ins under
      # /opt/homebrew/lib/gstreamer-1.0 (the Apple Silicon Homebrew prefix).
      # The plug-in list mirrors the one in build-dmg.sh: core, playback,
      # audio conversion + EQ + spectrum + format demuxers.
      - name: Install GStreamer via Homebrew
        run: |
          brew update
          brew install \
            pkg-config \
            gstreamer \
            gst-plugins-base \
            gst-plugins-good \
            gst-plugins-bad \
            gst-plugins-ugly \
            gst-libav \
            mpg123

      # ── Show environment (for build log diagnostics) ─────────────────────
      - name: Print build environment
        run: |
          echo "Xcode:         $(xcodebuild -version | head -1)"
          echo "Rust:          $(rustc --version)"
          echo "Cargo:         $(cargo --version)"
          echo "GStreamer:     $(pkg-config --modversion gstreamer-1.0 || echo 'not found')"
          echo "Arch:          $(uname -m)"

      # ── Vendor Rust dependencies ──────────────────────────────────────────
      # The repo's .cargo/config.toml redirects crates-io to a local `vendor/`
      # directory that is gitignored, so the runner needs to populate it
      # before any cargo build can succeed.
      - name: Vendor Rust dependencies
        run: cargo vendor

      # ── Pre-build the Rust static lib with full output ────────────────────
      # build-dmg.sh runs the same cargo command but pipes it through a grep
      # filter that hides errors. Doing it here first surfaces real compile
      # errors in the workflow log; the script's later invocation will be a
      # no-op cache hit.
      - name: Cargo build (Rust static lib)
        run: |
          cargo build --release \
            --manifest-path frontends/macos/Cargo.toml

      # ── Code signing (Developer ID) ──────────────────────────────────────
      # Runs only when the signing secrets are configured; without them the
      # build falls back to the historical ad-hoc signature (forks, PRs).
      # The cert lives in a throwaway keychain that a cleanup step deletes
      # even when the build fails.
      - name: Import Developer ID certificate
        id: import-cert
        if: ${{ github.event_name != 'pull_request' }}
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERT_P12" ]; then
            echo "No signing cert configured — building ad-hoc."
            echo "identity=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/sparkamp-signing.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -hex 16)"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          rm -f "$RUNNER_TEMP/cert.p12"
          # Allow codesign to use the key without a UI prompt.
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASS" "$KEYCHAIN" > /dev/null
          security list-keychains -d user \
            -s "$KEYCHAIN" ~/Library/Keychains/login.keychain-db
          identity="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk -F'"' '/Developer ID Application/ {print $2; exit}')"
          if [ -z "$identity" ]; then
            echo "ERROR: cert imported but no 'Developer ID Application' identity found" >&2
            exit 1
          fi
          echo "Signing as: $identity"
          echo "identity=$identity" >> "$GITHUB_OUTPUT"

      # ── Build the DMG ─────────────────────────────────────────────────────
      - name: Build DMG
        env:
          SPARKAMP_SIGN_IDENTITY: ${{ steps.import-cert.outputs.identity || '-' }}
        run: bash packaging/macos/build-dmg.sh

      # ── Find the produced DMG (filename includes MARKETING_VERSION) ──────
      - name: Locate DMG artifact
        id: locate-dmg
        run: |
          dmg="$(ls dist/Sparkamp-*.dmg | head -1)"
          if [ -z "$dmg" ]; then
            echo "ERROR: no DMG found in dist/" >&2
            exit 1
          fi
          echo "dmg=$dmg" >> "$GITHUB_OUTPUT"
          echo "dmg_basename=$(basename "$dmg")" >> "$GITHUB_OUTPUT"

      # ── Notarize + staple (signed builds only) ────────────────────────────
      # Apple scans the DMG and issues a notarization ticket; stapling embeds
      # it so Gatekeeper accepts the download even offline. Requires an App
      # Store Connect API key with the Developer role.
      - name: Notarize and staple DMG
        if: ${{ steps.import-cert.outputs.identity != '' }}
        env:
          NOTARY_KEY_P8: ${{ secrets.NOTARY_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          if [ -z "$NOTARY_KEY_P8" ]; then
            echo "Signing cert present but no notary API key — DMG is signed, NOT notarized." >&2
            echo "Gatekeeper will still warn on downloads. Configure NOTARY_* secrets." >&2
            exit 1
          fi
          echo "$NOTARY_KEY_P8" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          xcrun notarytool submit "${{ steps.locate-dmg.outputs.dmg }}" \
            --key "$RUNNER_TEMP/notary.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait --timeout 30m
          rm -f "$RUNNER_TEMP/notary.p8"
          xcrun stapler staple "${{ steps.locate-dmg.outputs.dmg }}"
          xcrun stapler validate "${{ steps.locate-dmg.outputs.dmg }}"
          # Final Gatekeeper verdict, exactly what a user's Mac will run.
          spctl --assess --type open --context context:primary-signature \
            -v "${{ steps.locate-dmg.outputs.dmg }}"

      # ── Clean up the throwaway keychain (always) ──────────────────────────
      - name: Remove signing keychain
        if: ${{ always() && steps.import-cert.outputs.identity != '' }}
        run: |
          security delete-keychain "$RUNNER_TEMP/sparkamp-signing.keychain-db" || true
          security list-keychains -d user -s ~/Library/Keychains/login.keychain-db

      # ── Upload artifact ───────────────────────────────────────────────────
      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sparkamp-dmg-${{ github.sha }}
          path: ${{ steps.locate-dmg.outputs.dmg }}
          retention-days: 30

      # ── Tag-only: attach DMG to the GitHub Release ────────────────────────
      # build-dmg.sh already names the file Sparkamp-<MARKETING_VERSION>.dmg,
      # which mirrors the tag (Cargo.toml + MARKETING_VERSION are bumped
      # together at release time), so no rename step is needed.
      - name: Attach DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate-dmg.outputs.dmg }}
          fail_on_unmatched_files: true

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Write job summary
        run: |
          echo "## Sparkamp macOS DMG Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact:** \`${{ steps.locate-dmg.outputs.dmg_basename }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download from the **Artifacts** section of this run, then:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "open ${{ steps.locate-dmg.outputs.dmg_basename }}" >> $GITHUB_STEP_SUMMARY
          echo "# drag SparkampMac.app to /Applications" >> $GITHUB_STEP_SUMMARY
          echo "# first launch:  right-click → Open  (or  xattr -cr /Applications/SparkampMac.app)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Build is ad-hoc signed (no Apple Developer cert) and arm64-only._" >> $GITHUB_STEP_SUMMARY
